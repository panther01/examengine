<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>UPPSC Practice</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/login.css">

</head>

<body>

<div class="background">

<div class="blob blob1"></div>

<div class="blob blob2"></div>

</div>

<div class="login-card" data-tilt>

<div class="seal">उ</div>

<span class="eyebrow">UPPSC · Prelims &amp; Mains</span>

<h1>UPPSC Practice</h1>

<p>

Previous Year Questions, by the book

</p>


<form id="loginForm">

<div class="input-group">

<label>

Username

</label>

<input

type="text"

id="username"

placeholder="Enter username"

required>

</div>

<div class="input-group">

<label>

Password

</label>

<input

type="password"

id="password"

placeholder="Enter password"

required>

</div>

<button>

Login

</button>

</form>

<div id="message"></div>

<p class="footnote">Progress saves automatically on this device</p>

</div>

<script src="js/auth.js"></script>

<script>
// Lightweight 3D tilt on the login card — cursor-driven, CSS transforms only.
(function(){
  var card = document.querySelector("[data-tilt]");
  if(!card) return;

  var supportsHover = window.matchMedia("(hover: hover) and (pointer: fine)").matches;
  var prefersReducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  if(!supportsHover || prefersReducedMotion) return;

  card.addEventListener("mousemove", function(e){
    var rect = card.getBoundingClientRect();
    var px = (e.clientX - rect.left) / rect.width - 0.5;
    var py = (e.clientY - rect.top) / rect.height - 0.5;
    card.style.transform =
      "perspective(900px) rotateX(" + (-py * 5).toFixed(2) + "deg) rotateY(" + (px * 5).toFixed(2) + "deg)";
  });
  card.addEventListener("mouseleave", function(){
    card.style.transform = "";
  });
})();
</script>

</body>

</html>
